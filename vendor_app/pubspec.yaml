name: vendor_app
description: "DODO Booker - Vendor Application"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  supabase_flutter: ^2.9.1
  flutter_riverpod: ^2.6.1
  go_router: ^16.0.0
  intl: ^0.20.2
  shared_preferences: ^2.5.5
  image_picker: ^1.1.2
  file_picker: ^8.0.0
  cupertino_icons: ^1.0.8
  geolocator: ^13.0.0
  http: ^1.3.0
  flutter_map: ^7.0.0
  latlong2: ^0.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.1

flutter_launcher_icons:
  image_path: "assets/images/logo.png"
  android: true
  ios: true
  web:
    generate: true
    image_path: "assets/images/logo.png"
  windows:
    generate: true
    image_path: "assets/images/logo.png"
  background_color_ios: "#ffffff"
  remove_alpha_ios: true

flutter:
  uses-material-design: true

  assets:
    - assets/images/
